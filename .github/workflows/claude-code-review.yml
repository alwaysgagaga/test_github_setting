name: Claude Code Review

on:
  pull_request:
    types: [labeled]

env:
  REVIEW_PROMPT: &review-prompt |
    REPO: ${{ github.repository }}
    PR NUMBER: ${{ github.event.pull_request.number }}

    First, read the entire PR diff using `gh pr diff` and `gh pr view` before starting your analysis.

    Please review this pull request and provide feedback on:
    - Code quality and best practices
    - Potential bugs or issues
    - Performance considerations
    - Security concerns
    - Test coverage

    Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

    Provide all feedback in a single PR comment (do NOT split into multiple comments), using this format:

    ## 📋 Review Summary
    **Overall**: ✅ Approve / ⚠️ Approve with suggestions / ❌ Request changes
    **Files reviewed**: (list all reviewed files)
    **Issues**: 🔴 Critical: N | 🟡 Suggestion: N | 🟢 Good: N

    ## 🔴 Critical Issues
    ## 🟡 Suggestions
    ## 🟢 Good Practices (at least one)

    ## Self-Approve Assessment

    Only include this section if Overall is ✅ Approve or ⚠️ Approve with suggestions.

    Evaluate the **scope of changes** (not code quality — that's covered above):

    | Criteria | Result |
    |----------|--------|
    | No 🔴 Critical issues above | PASS/FAIL |
    | No production runtime impact | PASS/FAIL — [reason if FAIL] |
    | No security-sensitive changes | PASS/FAIL — [reason if FAIL] |
    | Adequate test coverage | PASS/FAIL — [reason if FAIL] |

    "No production runtime impact" = changes don't alter end-user observable behavior (docs, tests, config, CI, type annotations, formatting → PASS).

    **Self-approve recommendation: YES/NO** — YES only if ALL PASS.

    Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

jobs:
  claude-review:
    if: github.event.label.name == 'claude-review'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: *review-prompt
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

  claude-review-deep:
    if: github.event.label.name == 'claude-review-deep'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Deep Code Review
        id: claude-review-deep
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: *review-prompt
          claude_args: '--model claude-opus-4-6 --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
